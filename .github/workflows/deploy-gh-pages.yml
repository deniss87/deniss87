name: Build & Deploy Portfolio

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Generate README
      - name: Generate README
        run: node scripts/generate-readme.js

      # 5. Generate HTML
      - name: Generate HTML
        run: node scripts/generate-html.js

      # 6. Prepare dist folder
      - name: Prepare dist
        run: |
          mkdir dist
          cp index.html dist/
          cp README.md dist/
          cp -r css dist/
          cp -r data dist/
          cp -r assets dist/ || true

      # 7. Deploy
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PROFILE_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          commit_message: "chore: deploy portfolio"
